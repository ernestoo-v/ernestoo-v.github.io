<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentaciones de Ataques de Hacking</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container text-center">
      <h1>Documentaciones de Ataques de Hacking</h1>
      <p class="lead">Explora una colección de documentaciones sobre ataques de hacking y sus defensas.</p>
    </div>
  </header>

  <div class="container py-5">
    <div id="cards-row" class="row row-cols-1 row-cols-md-3 g-4">
      <!-- Las tarjetas se generan aquí con JS -->
    </div>
    <div id="error-message" class="text-center mt-4" style="display: none;">
      <p>No se pudieron cargar las documentaciones. Verifica que el archivo <code>docs.json</code> esté presente.</p>
    </div>
  </div>
  
  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
